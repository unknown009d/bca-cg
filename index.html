<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BCA 6th Semester Attendance</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      iframe {
        height: 100vh;
        width: 100%;
      }
      body {
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <script>
      function buildIframe(url) {
        const iframe = document.createElement("iframe");
        iframe.src = url;
        iframe.frameBorder = "0";
        iframe.style.width = "100%";
        iframe.style.height = "100vh";
        return iframe;
      }

      function getUrl() {
        const ascii = [
          104, 116, 116, 112, 115, 58, 47, 47, 115, 99, 114, 105, 112, 116, 46,
          103, 111, 111, 103, 108, 101, 46, 99, 111, 109, 47, 109, 97, 99, 114,
          111, 115, 47, 115, 47, 65, 75, 102, 121, 99, 98, 120, 111, 86, 86,
          119, 84, 119, 75, 69, 53, 56, 95, 74, 54, 104, 70, 98, 69, 109, 69,
          54, 85, 84, 53, 82, 122, 83, 119, 72, 51, 102, 106, 65, 102, 82, 72,
          76, 77, 76, 110, 113, 74, 109, 100, 86, 54, 90, 117, 81, 87, 99, 118,
          99, 74, 101, 116, 116, 48, 76, 74, 118, 106, 103, 77, 56, 51, 47, 101,
          120, 101, 99,
        ];

        return String.fromCharCode(...ascii);
      }

      function init() {
        const iframe = buildIframe(getUrl());
        document.body.appendChild(iframe);
      }

      init();
    </script>
  </body>
</html>
