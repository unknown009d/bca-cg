<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BCA 6th Semester Attendance</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      iframe {
        height: 100vh;
        width: 100%;
      }
      body {
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <script>
      function buildIframe(url) {
        const iframe = document.createElement("iframe");
        iframe.src = url;
        iframe.frameBorder = "0";
        iframe.style.width = "100%";
        iframe.style.height = "100vh";
        return iframe;
      }

      function getUrl() {
        const ascii = [
          104, 116, 116, 112, 115, 58, 47, 47, 115, 99, 114, 105, 112, 116, 46,
          103, 111, 111, 103, 108, 101, 46, 99, 111, 109, 47, 109, 97, 99, 114,
          111, 115, 47, 115, 47, 65, 75, 102, 121, 99, 98, 121, 75, 109, 87, 69,
          119, 111, 119, 109, 89, 68, 100, 71, 52, 113, 120, 48, 87, 50, 76, 87,
          111, 102, 95, 113, 108, 77, 97, 66, 106, 107, 65, 71, 66, 116, 97,
          106, 66, 65, 117, 69, 55, 78, 109, 57, 70, 68, 73, 113, 53, 109, 95,
          71, 118, 87, 83, 78, 84, 89, 83, 68, 77, 69, 52, 82, 101, 47, 101,
          120, 101, 99,
        ];

        return String.fromCharCode(...ascii);
      }

      function init() {
        const iframe = buildIframe(getUrl());
        document.body.appendChild(iframe);
      }

      init();
    </script>
  </body>
</html>
